<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </radialGradient>
    <clipPath id="ballClip">
      <circle cx="32" cy="32" r="28"/>
    </clipPath>
  </defs>

  <!-- Ball sphere -->
  <circle cx="32" cy="32" r="28" fill="url(#ballGrad)" stroke="#1B4D2E" stroke-width="2"/>

  <!-- Dark green patches, clipped to circle -->
  <g clip-path="url(#ballClip)" fill="#1B4D2E">
    <!-- Center pentagon -->
    <polygon points="32,23 40,29 37,38 27,38 24,29"/>

    <!-- Top pentagon -->
    <polygon points="32,5 40,11 37,21 27,21 24,11"/>

    <!-- Upper-right pentagon -->
    <polygon points="48,11 56,18 54,28 44,29 40,20"/>

    <!-- Lower-right pentagon -->
    <polygon points="55,37 58,48 50,55 41,51 40,40"/>

    <!-- Bottom pentagon -->
    <polygon points="27,50 32,60 37,50 40,51 24,51"/>

    <!-- Lower-left pentagon -->
    <polygon points="9,37 14,48 23,51 24,40 12,33"/>

    <!-- Upper-left pentagon -->
    <polygon points="16,11 24,20 24,29 14,28 8,18"/>
  </g>
</svg>
